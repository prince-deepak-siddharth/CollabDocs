<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabDocs — Real-Time Collaborative Editor</title>
    <meta name="description" content="Create, share, and collaborate on documents in real-time with your team.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Username Modal -->
    <div id="username-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-icon">📝</div>
            <h2>Welcome to CollabDocs</h2>
            <p>Enter your name to get started</p>
            <input type="text" id="username-input" placeholder="Your name..." autocomplete="off" maxlength="30">
            <button id="username-submit" class="btn btn-primary btn-full">Get Started</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">📝</span>
                    <span class="logo-text">CollabDocs</span>
                </div>
            </div>
            <div class="header-right">
                <span class="user-badge" id="user-badge"></span>
                <button class="btn btn-ghost" id="logout-btn" title="Switch User">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <main class="dashboard">
            <div class="dashboard-header">
                <div>
                    <h1>My Documents</h1>
                    <p class="subtitle">Create and collaborate in real-time</p>
                </div>
                <button class="btn btn-primary" id="new-doc-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Document
                </button>
            </div>

            <div id="documents-grid" class="documents-grid">
                <!-- Documents will be rendered here -->
            </div>

            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">📄</div>
                <h3>No documents yet</h3>
                <p>Create your first document and start collaborating!</p>
                <button class="btn btn-primary" id="empty-new-doc-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Create Document
                </button>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
